<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="background: #000;">
    <script>
        (function() {
            var user = "laszlovarjutechno";
            var start = Date.now();
            var isAndroid = /android/i.test(navigator.userAgent);

            if (isAndroid) {
                // Javított Android Intent
                window.location.href = "intent://://instagram.com" + user + "/#Intent;package=com.instagram.android;scheme=https;end";
            } else {
                // Javított iOS séma
                window.location.href = "instagram://user?username=" + user;
            }

            // Ha nem ugrik az appba, megy a webre (itt is javítva a / jel)
            setTimeout(function() {
                if (Date.now() - start < 2500) {
                    window.location.href = "https://://instagram.com" + user + "/";
                }
            }, 2000);
        })();
    </script>
</body>
</html>
