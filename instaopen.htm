<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="background: #000;">

    <script>
        var isMobile = /android|iPad|iPhone|iPod/i.test(navigator.userAgent);

        if (/android/i.test(navigator.userAgent)) {
            window.location.replace("intent://instagram.com/laszlovarjutechno");
        } 
        else if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
            window.location.replace("instagram://user?username=laszlovarjutechno");
        }
        setTimeout(function() {
            window.location.replace("https://laszlovarju.com");
        }, isMobile ? 1600 : 0);
    </script>

</body>
</html>
